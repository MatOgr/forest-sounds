name: Python CI 🚀
on:
    push:
        branches:
            - main
            - develop
    pull_request:
        branches:
            - main
            - develop
jobs:
    build_and_test:
        if: github.event_name == 'pull_request'
        runs-on: ubuntu-latest
        steps:
            - name: ⬇️ Checkout code
              uses: actions/checkout@v6
            - name: ⚙️ Setup uv
              uses: astral-sh/setup-uv@v6
              with:
                  enable-cache: true
            - name: 🐍 Setup Python
              run: uv python install
            - name: 🔧 Setup just
              uses: extractions/setup-just@v3
            - name: 📦 Install dependencies
              run: just install
            - name: 📝 Check code formatting with ruff
              run: just fmt-check
              continue-on-error: true
            - name: 🔍 Lint code with ruff
              run: just lint
              continue-on-error: true
            - name: ✅ Run tests
              run: just test

    changelog:
        if: github.event_name == 'pull_request'
        runs-on: ubuntu-latest
        permissions:
            contents: read
            pull-requests: write
        steps:
            - name: ⬇️ Checkout code
              uses: actions/checkout@v6
              with:
                  fetch-depth: 0 # Full history needed for git-cliff

            - name: 📋 Generate changelog
              uses: orhun/git-cliff-action@v4
              id: git-cliff
              with:
                  args: --unreleased --strip header
              env:
                  GITHUB_REPO: ${{ github.repository }}

            - name: 💬 Post or update PR comment
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  PR_NUMBER=${{ github.event.pull_request.number }}
                  MARKER="<!-- changelog-bot -->"
                  BODY=$(cat <<'EOF'
                  ${{ steps.git-cliff.outputs.content }}
                  EOF
                  )
                  COMMENT="${MARKER}
                  ## 📋 Changelog

                  ${BODY}

                  ---
                  *Auto-generated by [git-cliff](https://git-cliff.org).*"

                  # Find existing comment by marker
                  EXISTING=$(gh api "repos/${{ github.repository }}/issues/${PR_NUMBER}/comments" \
                    --jq ".[] | select(.body | startswith(\"${MARKER}\")) | .id" | head -1)

                  if [ -n "$EXISTING" ]; then
                    gh api "repos/${{ github.repository }}/issues/comments/${EXISTING}" \
                      -X PATCH -f body="$COMMENT"
                  else
                    gh pr comment "$PR_NUMBER" --body "$COMMENT"
                  fi

    changelog_commit:
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        runs-on: ubuntu-latest
        permissions:
            contents: write
        steps:
            - name: ⬇️ Checkout code
              uses: actions/checkout@v6
              with:
                  fetch-depth: 0 # Full history needed for git-cliff

            - name: 📋 Generate CHANGELOG.md
              uses: orhun/git-cliff-action@v4
              id: git-cliff
              with:
                  args: --output CHANGELOG.md
              env:
                  GITHUB_REPO: ${{ github.repository }}

            - name: 💾 Commit changelog
              run: |
                  git config user.name "github-actions[bot]"
                  git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
                  if git diff --quiet CHANGELOG.md; then
                    echo "No changelog changes."
                    exit 0
                  fi
                  git add CHANGELOG.md
                  git commit -m "chore: update changelog [skip ci]"
                  git push
